name: Deploy via rsync

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync files over SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync changed files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_PATH: ${{ secrets.SSH_TARGET_PATH }}
        run: |
          set -eu

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat > ~/.ssh/askpass.sh <<'EOF'
          #!/usr/bin/env sh
          printf '%s' "$SSH_PASSPHRASE"
          EOF
          chmod 700 ~/.ssh/askpass.sh

          eval "$(ssh-agent -s)"
          DISPLAY=:0 SSH_ASKPASS=~/.ssh/askpass.sh setsid -w ssh-add ~/.ssh/id_rsa < /dev/null

          rsync -az --delete \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            ./ "$SSH_USERNAME@$SSH_HOST:$SSH_TARGET_PATH/"
